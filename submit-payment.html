<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Submit Payment | 2FLY Payment Hub</title><link rel="stylesheet" href="styles.css"></head>
<body data-page="submit">
<nav class="nav"><div class="container nav-inner"><a class="logo" href="admin.html"><div class="mark">2F</div><div><div class="brand">2FLY Payment Hub</div><div class="sub" id="userLabel">Loading...</div></div></a><div class="nav-links"><a class="nav-link" href="submit-payment.html">Submit</a><a class="nav-link" href="admin.html">Verify</a><a class="nav-link" href="reports.html">Reports</a><a class="nav-link" href="setup.html">Setup</a><button class="btn secondary small" onclick="logout()">Logout</button></div></div></nav>
<main class="page"><div class="container"><section class="card"><h1>Upload payment proof.</h1><p>Manual Order ID for both online and walk-in. Example walk-in: WALKIN-20260515-001</p></section>
<section class="card"><h2>Payment Form</h2><div id="formNotice" class="notice" hidden></div>
<form id="paymentForm"><div class="grid two"><div class="field"><label>Customer Type</label><select name="customer_type" required><option value="online">Online</option><option value="walkin">Walk-in</option></select></div><div class="field"><label>Order ID</label><input name="order_id" required placeholder="2FLY-001 or WALKIN-20260515-001"></div></div>
<div class="grid two"><div class="field"><label>Customer Name</label><input name="customer_name" placeholder="Customer name or Walk-in Customer"></div><div class="field"><label>Payment Method</label><select name="payment_method" id="paymentMethod" required></select></div></div>
<div class="grid two"><div class="field"><label>Amount Paid</label><input name="amount" type="number" min="0" step="0.01" required></div><div class="field"><label>Reference Number</label><input name="reference_number" placeholder="GCash ref no. / cash receipt no."></div></div>
<div class="field"><label>Payment Screenshot / Proof</label><input name="proof" type="file" accept="image/*"></div><div class="field"><label>Notes</label><textarea name="notes"></textarea></div><button class="btn">Submit Payment</button></form>
</section></div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body></html>
