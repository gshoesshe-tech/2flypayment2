<div class="field"><label>Google Sheets Web App URL — optional for now</label><input id="sheetsUrl" placeholder="Leave blank muna"></div>
<div class="grid two"><div class="field"><label>GCash 1 Name</label><input id="gcash1Name"></div><div class="field"><label>GCash 1 Number</label><input id="gcash1Number"></div></div>
<div class="grid two"><div class="field"><label>GCash 2 Name</label><input id="gcash2Name"></div><div class="field"><label>GCash 2 Number</label><input id="gcash2Number"></div></div>
<div class="grid two"><div class="field"><label>GCash 3 Name</label><input id="gcash3Name"></div><div class="field"><label>GCash 3 Number</label><input id="gcash3Number"></div></div>
<button class="btn" style="width:100%">Save Setup</button>
</form><p class="helper">Use only anon public key. Never use service_role.</p></section></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body></html>
