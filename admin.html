<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Verify Payments | 2FLY Payment Hub</title><link rel="stylesheet" href="styles.css"></head>
<body data-page="admin">
<nav class="nav"><div class="container nav-inner"><a class="logo" href="admin.html"><div class="mark">2F</div><div><div class="brand">2FLY Payment Hub</div><div class="sub" id="userLabel">Loading...</div></div></a><div class="nav-links"><a class="nav-link" href="submit-payment.html">Submit</a><a class="nav-link" href="admin.html">Verify</a><a class="nav-link" href="reports.html">Reports</a><a class="nav-link" href="setup.html">Setup</a><button class="btn secondary small" onclick="logout()">Logout</button></div></div></nav>
<main class="page"><div class="container"><section class="card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap"><div><h1>Payment verification.</h1><p>Approve only after checking proof, reference number, and correct account.</p></div><a class="btn" href="submit-payment.html">+ Add Payment</a></div>

<div class="toolbar"><input id="searchInput" placeholder="Search order, name, ref..." style="max-width:320px"><select id="statusFilter"><option value="pending">Pending</option><option value="verified">Verified</option><option value="needs_review">Needs Review</option><option value="rejected">Rejected</option><option value="duplicate">Duplicate</option><option value="all">All Status</option></select><select id="typeFilter"><option value="all">All Types</option><option value="online">Online</option><option value="walkin">Walk-in</option></select><select id="paymentMethodFilter"></select></div></section>
